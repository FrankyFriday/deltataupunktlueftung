<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensor Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar">
    <div class="logo">Delta-Taupunktlüftung</div>
    <div>
        <a href="/index">Übersicht</a>
        <a href="/sensoren" class="active">Sensoren</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">

    <!-- SENSOR TABLE -->
    <section class="card">
        <h2>📡 Sensorwerte</h2>

        <table class="sensor-table">
            <thead>
                <tr>
                    <th>Zeit</th>
                    <th>Temp Innen</th>
                    <th>Temp Außen</th>
                    <th>Feuchte Innen</th>
                    <th>Feuchte Außen</th>
                </tr>
            </thead>

            <tbody id="sensor_table_body">
                <tr><td colspan="5">Lade Daten...</td></tr>
            </tbody>
        </table>
    </section>

    <section class="card">
        <h2>🌀 Lüfter Status</h2>

        <div class="fan-grid">
            <div>State: <b id="fan_state">--</b></div>
            <div>Mode: <b id="fan_mode">--</b></div>
            <div>Speed: <b id="fan_speed">--</b>%</div>
        </div>
    </section>

</div>

<footer>© 2025 Delta-Taupunktlüftung</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
