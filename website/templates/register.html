<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrierung – Delta Taupunktlüftung</title>
    <style>
        /* Reset & Basis */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #2c3e50;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            background: #fff;
            max-width: 900px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(44, 62, 80, 0.15);
            display: flex;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }
        .container:hover {
            box-shadow: 0 28px 60px rgba(44, 62, 80, 0.25);
        }

        /* Linke Seite */
        .left {
            flex: 1;
            padding: 60px 70px 60px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff;
        }

        .left h1 {
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 10px;
            color: #34495e;
            letter-spacing: -0.02em;
        }

        .left h3 {
            font-weight: 400;
            color: #7f8c8d;
            margin-bottom: 48px;
            letter-spacing: 1.3px;
            text-transform: uppercase;
        }

        label {
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            font-size: 16px;
            color: #34495e;
            letter-spacing: 0.02em;
            user-select: none;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 32px;
            border: 2px solid #d1d8e0;
            border-radius: 14px;
            font-size: 17px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-weight: 500;
            color: #2c3e50;
            background: #f9fbfc;
        }

        input::placeholder {
            color: #a6b0b8;
            font-style: italic;
        }

        input:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.35);
            outline: none;
            background: #fff;
        }

        .btn {
            background: #e74c3c;
            border: none;
            border-radius: 16px;
            padding: 18px 0;
            font-size: 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.45);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            user-select: none;
        }

        .btn:hover,
        .btn:focus {
            background: #c0392b;
            box-shadow: 0 10px 26px rgba(192, 57, 43, 0.6);
            outline: none;
        }

        .signup {
            margin-top: 28px;
            font-size: 15px;
            color: #7f8c8d;
            text-align: center;
        }

        .signup a {
            color: #e74c3c;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.25s ease;
            user-select: none;
        }

        .signup a:hover,
        .signup a:focus {
            color: #c0392b;
        }

        /* Flash-Message */
        ul.flashes {
            list-style: none;
            padding: 14px 20px;
            margin-bottom: 28px;
            background-color: #fcebea;
            border: 1.5px solid #e74c3c;
            border-radius: 12px;
            color: #c0392b;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(231, 76, 60, 0.2);
        }

        /* Rechte Seite (Bilder) */
        .right {
            flex: 1;
            background: linear-gradient(135deg, #e74c3c 0%, #f1948a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            gap: 30px;
            color: white;
            user-select: none;
        }

        .right img.logo {
            max-width: 260px;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.22));
            transition: transform 0.3s ease;
            cursor: default;
        }
        .right img.logo:hover {
            transform: scale(1.05);
        }

        .right img.orgadata {
            max-width: 220px;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.18));
            margin-top: auto;
            cursor: default;
        }

        .right img {
            max-width: 320px;
            border-radius: 18px;
            box-shadow: 0 16px 36px rgba(0,0,0,0.2);
            background: white;
            cursor: default;
            transition: transform 0.3s ease;
        }
        .right img:hover {
            transform: scale(1.03);
        }

        /* Responsive */
        @media (max-width: 860px) {
            .container {
                flex-direction: column;
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
            }
            .left, .right {
                flex: none;
                width: 100%;
                padding: 40px 30px;
            }
            .right {
                background: none;
                color: #2c3e50;
                padding-top: 0;
                gap: 18px;
            }
            .right img.logo,
            .right img.orgadata,
            .right img {
                max-width: 180px;
                box-shadow: none;
                background: none;
                filter: none;
            }
        }
    </style>
</head>
<body>

    <div class="container" role="main" aria-label="Registrierungsbereich">
        <div class="left">

            <h1>Registrieren</h1>
            <h3>Erstelle einen neuen Account</h3>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <ul class="flashes" role="alert" aria-live="assertive">
                  {% for message in messages %}
                    <li>{{ message }}</li>
                  {% endfor %}
                </ul>
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}" novalidate>
                <label for="username">Benutzername</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Benutzername eingeben"
                    required
                    aria-required="true"
                />

                <label for="email">E-Mail-Adresse (für Benachrichtigungen)</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="name@example.com"
                    required
                    aria-required="true"
                />

                <label for="password">Passwort</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="**********"
                    required
                    aria-required="true"
                />

                <button class="btn" type="submit" aria-label="Registrieren">Registrieren</button>
            </form>

            <p class="signup">
                Bereits ein Konto? <a href="{{ url_for('login') }}">Jetzt anmelden!</a>
            </p>

        </div>

        <div class="right" aria-hidden="true">
            <img src="{{ url_for('static', filename='img/buenting.svg') }}" class="logo" alt="Buenting Logo" />
            <img src="{{ url_for('static', filename='img/joypi.png') }}" alt="JoyPi Koffer" />
            <img src="{{ url_for('static', filename='img/orgadata.svg') }}" class="orgadata" alt="Orgadata Logo" />
        </div>

    </div>

</body>
</html>
